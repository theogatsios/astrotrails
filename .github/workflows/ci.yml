# SPDX-License-Identifier: GPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "${{ matrix.os }} / py${{ matrix.python }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install system ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install system ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      # On Windows we rely on the bundled imageio-ffmpeg binary.

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        # The GUI needs a display on Linux; headless via xvfb.
        run: |
          pytest --cov=astrotrails --cov-report=xml
        shell: bash

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
